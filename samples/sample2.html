<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>React Hooks 要点</title>
<style>body{font-family:Georgia,serif;max-width:720px;margin:auto;padding:24px;line-height:1.8}
table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:8px}</style></head>
<body><h1>React Hooks 要点</h1>
<p>関数コンポーネントで状態やライフサイクルを扱う仕組み。useState, useEffect, useMemo などがある。</p>
<table><tr><th>Hook</th><th>用途</th></tr>
<tr><td>useState</td><td>状態管理</td></tr>
<tr><td>useEffect</td><td>副作用・購読</td></tr>
<tr><td>useMemo</td><td>計算結果のメモ化で過学習ならぬ過剰計算を防ぐ</td></tr></table>
</body></html>
