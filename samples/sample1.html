<body><h1>機械学習の基礎まとめ</h1>
<p>機械学習は教師あり学習、教師なし学習、強化学習に大別される。本まとめでは勾配降下法と過学習について整理する。</p>
<h2>勾配降下法</h2><p>損失関数を最小化するために、パラメータを勾配の逆方向へ更新する。学習率の設定が重要である。</p>
<h2>過学習</h2><p>訓練データに適合しすぎて汎化性能が落ちる現象。正則化やドロップアウトで抑制する。</p>
